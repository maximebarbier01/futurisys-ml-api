name: CD - Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync repository to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: maximebarbier01/futurisys-ml-api
          huggingface_repo_id: mxmbrbr/futurisys-ml-api
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker