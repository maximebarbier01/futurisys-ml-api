name: CI - Tests API

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.11"
  REQUIREMENTS_FILE: "requirements-dev.txt"
  APP_PACKAGE: "app"
  TESTS_DIR: "tests"
  COVERAGE_MIN: "70"
  COVERAGE_XML_FILE: "coverage.xml"
  COVERAGE_HTML_DIR: "htmlcov"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configuration de l'environnement Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. Installation des dépendances et des outils de test
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.REQUIREMENTS_FILE }}

      # 4. Exécution des tests et mesure de la couverture du code
      - name: Run tests
        run: |
          pytest \
            --cov=${{ env.APP_PACKAGE }} \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=${{ env.COVERAGE_MIN }} \
            ${{ env.TESTS_DIR }}

      # 5. Publication des rapports de couverture comme artefacts GitHub Actions
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            ${{ env.COVERAGE_XML_FILE }}
            ${{ env.COVERAGE_HTML_DIR }}
